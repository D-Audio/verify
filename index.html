<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Верификация на фактура – ДелтаТех Плюс ЕООД</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: #1a1a2e;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      max-width: 480px;
      width: 100%;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
      padding: 2rem 2rem 1.5rem;
      text-align: center;
      color: #fff;
    }

    .card-header .logo-text {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      opacity: 0.9;
      margin-bottom: 0.25rem;
    }

    .card-header .subtitle {
      font-size: 0.8rem;
      opacity: 0.6;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .card-body { padding: 2rem; }

    .state-loading { text-align: center; padding: 1rem 0; }

    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #e0e0e0;
      border-top-color: #0f3460;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result-icon { font-size: 4rem; text-align: center; line-height: 1; margin-bottom: 0.75rem; }
    .result-title { font-size: 1.4rem; font-weight: 700; text-align: center; margin-bottom: 0.5rem; }
    .result-subtitle { font-size: 0.9rem; text-align: center; opacity: 0.65; margin-bottom: 1.5rem; }

    .valid .result-title   { color: #1a7a4a; }
    .invalid .result-title { color: #c0392b; }

    .invoice-details {
      background: #f7f9fc;
      border: 1px solid #e8ecf0;
      border-radius: 10px;
      padding: 1.25rem;
      margin-top: 1rem;
    }

    .invoice-details h3 {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #8898aa;
      margin-bottom: 0.9rem;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.45rem 0;
      border-bottom: 1px solid #eef0f3;
    }

    .detail-row:last-child { border-bottom: none; }
    .detail-label { font-size: 0.82rem; color: #6b7280; }
    .detail-value { font-size: 0.92rem; font-weight: 600; color: #1a1a2e; }
    .detail-value.amount { font-size: 1.05rem; color: #0f3460; }

    .bank-details {
      background: #f0f7ff;
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      padding: 1.25rem;
      margin-top: 1rem;
    }

    .bank-details h3 {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #3b82f6;
      margin-bottom: 0.9rem;
    }

    .error-box {
      background: #fff5f5;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #c0392b;
      line-height: 1.5;
    }

    .card-footer {
      border-top: 1px solid #f0f2f5;
      padding: 1rem 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: #adb5bd;
    }

    .card-footer a { color: #0f3460; text-decoration: none; }

    .badge-valid {
      display: inline-block;
      background: #dcfce7;
      color: #166534;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      margin-left: 0.4rem;
      vertical-align: middle;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="logo-text">ДелтаТех Плюс ЕООД</div>
    <div class="subtitle">Верификация на документ</div>
  </div>

  <div class="card-body" id="content">
    <div class="state-loading">
      <div class="spinner"></div>
      <p style="color:#6b7280;font-size:0.9rem;">Проверка на подписа…</p>
    </div>
  </div>

  <div class="card-footer">
    Издаден от <strong>ДелтаТех Плюс ЕООД</strong> &middot;
    <a href="https://deltatech.bg" target="_blank" rel="noopener">deltatech.bg</a>
  </div>
</div>

<script>
const PUBLIC_KEY_JWK = {
  kty: "EC", crv: "P-256",
  x: "mOMNqCXAQilj0huCOzAEv_4j3J0MFrMH07vwz5fT0FY",
  y: "_8mPBq6wMjccrgxfLoxuRMr5GKQRBOSRJ87FCYPlSaw"
};

function b64urlToUint8(str) {
  const b64 = str.replace(/-/g, '+').replace(/_/g, '/');
  return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatAmount(raw) {
  const n = parseFloat(raw);
  if (isNaN(n)) return escapeHtml(raw);
  return n.toLocaleString('bg-BG', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' EUR';
}

function formatDate(raw) {
  if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) {
    const [y, m, d] = raw.split('-');
    return `${d}.${m}.${y}`;
  }
  return escapeHtml(raw);
}

async function verify() {
  const content = document.getElementById('content');
  const params = new URLSearchParams(window.location.search);
  const n   = params.get('n');
  const t   = params.get('t');
  const d   = params.get('d');
  const sig = params.get('sig');
  const iban     = params.get('iban');
  const bankName = params.get('bank');
  const bic      = params.get('bic');

  if (!n || !t || !d || !sig) {
    content.innerHTML = `
      <div class="invalid">
        <div class="result-icon">⚠️</div>
        <div class="result-title">Невалиден линк</div>
        <div class="result-subtitle">Липсват задължителни параметри.</div>
        <div class="error-box">
          Линкът трябва да съдържа параметри <code>n</code>, <code>t</code>,
          <code>d</code> и <code>sig</code>. Моля, сканирайте QR кода от оригиналната фактура.
        </div>
      </div>`;
    return;
  }

  try {
    const cryptoKey = await crypto.subtle.importKey(
      'jwk', PUBLIC_KEY_JWK,
      { name: 'ECDSA', namedCurve: 'P-256' },
      false, ['verify']
    );

    const message  = `${n}|${t}|${d}`;
    const msgBytes = new TextEncoder().encode(message);
    const sigBytes = b64urlToUint8(sig);

    const valid = await crypto.subtle.verify(
      { name: 'ECDSA', hash: 'SHA-256' },
      cryptoKey, sigBytes, msgBytes
    );

    if (valid) {
      const bankBlock = (iban || bankName || bic) ? `
        <div class="bank-details">
          <h3>Банкова сметка</h3>
          ${iban ? `<div class="detail-row"><span class="detail-label">IBAN</span><span class="detail-value" style="font-family:monospace">${escapeHtml(iban)}</span></div>` : ''}
          ${bankName ? `<div class="detail-row"><span class="detail-label">Банка</span><span class="detail-value">${escapeHtml(bankName)}</span></div>` : ''}
          ${bic ? `<div class="detail-row"><span class="detail-label">BIC / SWIFT</span><span class="detail-value" style="font-family:monospace">${escapeHtml(bic)}</span></div>` : ''}
        </div>` : '';

      content.innerHTML = `
        <div class="valid">
          <div class="result-icon">✅</div>
          <div class="result-title">Документът е автентичен <span class="badge-valid">ВАЛИДЕН</span></div>
          <div class="result-subtitle">Подписът е верифициран успешно от ДелтаТех Плюс ЕООД.</div>
          <div class="invoice-details">
            <h3>Данни на документа</h3>
            <div class="detail-row"><span class="detail-label">Номер</span><span class="detail-value">${escapeHtml(n)}</span></div>
            <div class="detail-row"><span class="detail-label">Дата</span><span class="detail-value">${formatDate(d)}</span></div>
            <div class="detail-row"><span class="detail-label">Сума</span><span class="detail-value amount">${formatAmount(t)}</span></div>
            <div class="detail-row"><span class="detail-label">Издател</span><span class="detail-value">ДелтаТех Плюс ЕООД</span></div>
          </div>
          ${bankBlock}
        </div>`;
    } else {
      content.innerHTML = `
        <div class="invalid">
          <div class="result-icon">❌</div>
          <div class="result-title">Невалиден подпис</div>
          <div class="result-subtitle">Документът не може да бъде верифициран.</div>
          <div class="error-box">
            Подписът не съответства на данните. Фактурата може да е
            модифицирана или линкът е непълен. Свържете се с ДелтаТех Плюс ЕООД за съдействие.
          </div>
        </div>`;
    }
  } catch (err) {
    content.innerHTML = `
      <div class="invalid">
        <div class="result-icon">⚠️</div>
        <div class="result-title">Грешка при верификация</div>
        <div class="result-subtitle">Техническа грешка.</div>
        <div class="error-box">Неочаквана грешка: ${escapeHtml(err.message)}.<br>Моля, опитайте отново или се свържете с нас.</div>
      </div>`;
  }
}

verify();
</script>
</body>
</html>
